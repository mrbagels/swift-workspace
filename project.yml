name: SwiftWorkspace

options:
  bundleIdPrefix: com.kylebegeman.swiftworkspace
  createIntermediateGroups: true
  defaultConfig: Debug
  deploymentTarget:
    iOS: "26.0"
    macOS: "26.0"

configs:
  Debug: debug
  Release: release

settings:
  base:
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: 2GJYKNRCG6
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    MARKETING_VERSION: 0.1.1
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_VERSION: 6.0

packages:
  SwiftWorkspace:
    path: .

targets:
  MacWorkspaceDemo:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Apps/MacWorkspaceDemo
    dependencies:
      - package: SwiftWorkspace
        product: MacWorkspaceShell
      - package: SwiftWorkspace
        product: WorkspaceEngine
      - package: SwiftWorkspace
        product: WorkspaceSQLiteData
      - package: SwiftWorkspace
        product: WorkspaceCloudKit
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_FILE: Apps/MacWorkspaceDemo/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.kylebegeman.swiftworkspace.mac-demo
        PRODUCT_NAME: Workspace Demo

  MacWorkspaceDemoUITests:
    type: bundle.ui-testing
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Apps/MacWorkspaceDemoUITests
    dependencies:
      - target: MacWorkspaceDemo
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.kylebegeman.swiftworkspace.mac-demo-ui-tests
        TEST_TARGET_NAME: MacWorkspaceDemo

  IOSWorkspaceDemo:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Apps/IOSWorkspaceDemo
    dependencies:
      - package: SwiftWorkspace
        product: IOSWorkspaceShell
      - package: SwiftWorkspace
        product: WorkspaceEngine
      - package: SwiftWorkspace
        product: WorkspaceCloudKit
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_FILE: Apps/IOSWorkspaceDemo/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.kylebegeman.swiftworkspace.ios-demo
        PRODUCT_NAME: Workspace Demo
        SUPPORTS_MACCATALYST: NO
        TARGETED_DEVICE_FAMILY: "1,2"

  IOSWorkspaceDemoUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Apps/IOSWorkspaceDemoUITests
    dependencies:
      - target: IOSWorkspaceDemo
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.kylebegeman.swiftworkspace.ios-demo-ui-tests
        TEST_TARGET_NAME: IOSWorkspaceDemo

  MinimalMacWorkspaceApp:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Examples/MinimalMacWorkspaceApp
    dependencies:
      - package: SwiftWorkspace
        product: MacWorkspaceShell
      - package: SwiftWorkspace
        product: WorkspaceEngine
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.kylebegeman.swiftworkspace.minimal-mac
        PRODUCT_NAME: Minimal Workspace

  MinimalIOSWorkspaceApp:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Examples/MinimalIOSWorkspaceApp
    dependencies:
      - package: SwiftWorkspace
        product: IOSWorkspaceShell
      - package: SwiftWorkspace
        product: WorkspaceEngine
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_FILE: Examples/MinimalIOSWorkspaceApp/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.kylebegeman.swiftworkspace.minimal-ios
        PRODUCT_NAME: Minimal Workspace
        SUPPORTS_MACCATALYST: NO
        TARGETED_DEVICE_FAMILY: "1,2"

schemes:
  MacWorkspaceDemo:
    build:
      targets:
        MacWorkspaceDemo: all
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - MacWorkspaceDemoUITests

  IOSWorkspaceDemo:
    build:
      targets:
        IOSWorkspaceDemo: all
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - IOSWorkspaceDemoUITests

  MinimalMacWorkspaceApp:
    build:
      targets:
        MinimalMacWorkspaceApp: all
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets: []

  MinimalIOSWorkspaceApp:
    build:
      targets:
        MinimalIOSWorkspaceApp: all
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets: []
